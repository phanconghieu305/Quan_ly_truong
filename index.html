<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sổ theo dõi trường học</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script>if(typeof XLSX==='undefined')document.write('<scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/scr'+'ipt>')</script>
<style>
:root{
  --ink:#1B3A6B; --stamp:#B3372E; --ok:#2E7D4F; --warn:#B07D1F;
  --paper:#F6F7F4; --card:#FFFFFF; --text:#22303F; --muted:#6B7787;
  --line:#DDE2E8; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--text);line-height:1.55;min-height:100vh}
header{background:var(--ink);color:#fff;padding:20px 16px 0}
.wrap{max-width:1060px;margin:0 auto;padding:0 4px}
.brand{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px}
h1{font-size:1.35rem;font-weight:800;letter-spacing:.2px}
.brand small{opacity:.75;font-weight:400}
.toolbar{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.toolbar button{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:8px;font:inherit;font-size:.82rem;cursor:pointer}
.toolbar button:hover{background:rgba(255,255,255,.22)}
/* Nút "Nhập mã" nổi bật khi chưa đăng nhập (thu hút các trường bấm vào) */
.toolbar button.needcode{background:#FFC83D;color:#3A2A00;border:1px solid #E6A700;font-weight:800;font-size:.95rem;padding:9px 18px;box-shadow:0 2px 10px rgba(255,180,0,.5);animation:pulseCode 1.8s ease-in-out infinite}
.toolbar button.needcode:hover{background:#FFD65C}
@keyframes pulseCode{0%,100%{box-shadow:0 2px 10px rgba(255,180,0,.5);transform:scale(1)}50%{box-shadow:0 3px 16px rgba(255,180,0,.85);transform:scale(1.04)}}
nav{display:flex;gap:6px;overflow-x:auto}
nav button{position:relative;display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-bottom:none;color:#fff;font:inherit;font-size:.88rem;font-weight:700;letter-spacing:.2px;padding:10px 15px;cursor:pointer;border-radius:11px 11px 0 0;white-space:nowrap;transition:background .15s,transform .15s}
nav button .tic{font-size:1.02rem;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
nav button:hover{background:rgba(255,255,255,.24);transform:translateY(-1px)}
nav button.active{background:var(--paper);color:var(--ink);border-color:var(--paper);transform:none}
nav button.active::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:11px 11px 0 0;background:linear-gradient(90deg,#FFC83D,#FF8A3D)}
main{max-width:1060px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card h2{font-size:1.02rem;color:var(--ink);margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;text-align:center}
.stat b{display:block;font-size:1.7rem;color:var(--ink);font-weight:800}
.stat span{font-size:.8rem;color:var(--muted)}
.stat.red b{color:var(--stamp)} .stat.green b{color:var(--ok)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th,td{padding:8px 9px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:center}
.btn{background:var(--ink);color:#fff;border:none;padding:8px 16px;border-radius:8px;font:inherit;font-size:.88rem;font-weight:600;cursor:pointer}
.btn:hover{opacity:.92}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.sm{padding:4px 10px;font-size:.78rem}
.btn.danger{background:transparent;color:var(--stamp);border:1px solid var(--stamp)}
.rowactions{display:flex;gap:6px;flex-wrap:wrap}
.stamp{display:inline-block;padding:2px 10px;border:2px solid;border-radius:6px;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;transform:rotate(-2deg);background:transparent}
.stamp.ok{color:var(--ok);border-color:var(--ok)}
.stamp.late{color:var(--warn);border-color:var(--warn)}
.stamp.miss{color:var(--stamp);border-color:var(--stamp)}
.stamp.crit{color:#fff;background:var(--stamp);border-color:var(--stamp)}
.stamp.wait{color:var(--muted);border-color:var(--muted);transform:none;border-style:dashed;font-weight:600}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.74rem;font-weight:600;white-space:nowrap}
.tag.act{background:#E8EEF8;color:var(--ink)}
.tag.vio{background:#F9E7E5;color:var(--stamp)}
.tag.merit{background:#E6F2EA;color:var(--ok)}
.tag.r-good{background:#E6F2EA;color:var(--ok)}
.tag.r-pass{background:#E8EEF8;color:var(--ink)}
.tag.r-fail{background:#FBF3E2;color:var(--warn)}
.tag.r-none{background:#EEF0F3;color:var(--muted)}
.tag.r-exc{background:var(--ok);color:#fff}
.topline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
select,input,textarea{font:inherit;font-size:.88rem;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);width:100%}
textarea{resize:vertical;min-height:70px}
label{font-size:.8rem;font-weight:600;color:var(--muted);display:block;margin-bottom:4px}
.field{margin-bottom:12px}
.check{display:flex;align-items:center;gap:8px;font-size:.88rem}
.check input{width:auto}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{width:auto;min-width:140px}
.overlay{position:fixed;inset:0;background:rgba(20,30,45,.45);display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;z-index:10}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:460px;border-top:5px solid var(--ink)}
.modal h3{color:var(--ink);margin-bottom:14px;font-size:1.05rem}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:.9rem}
.empty b{display:block;color:var(--text);margin-bottom:4px}
.note{font-size:.78rem;color:var(--muted);margin-top:2px}
.progressbar{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:6px}
.progressbar i{display:block;height:100%;background:var(--ok)}
.deadline{font-size:.78rem;color:var(--muted)}
.deadline.over{color:var(--stamp);font-weight:600}
.legend{font-size:.8rem;color:var(--muted);background:#F0F2F5;border-radius:8px;padding:10px 12px;margin-bottom:12px}
.rank1{font-weight:800;color:var(--ink)}
.notes-cell{font-size:.78rem;max-width:260px}
.notes-cell .m{color:var(--ok)} .notes-cell .v{color:var(--stamp)}
.evalnote{font-size:.8rem;padding:4px 8px;min-width:120px}
.scorepos{color:var(--ok);font-weight:700}.scoreneg{color:var(--stamp);font-weight:700}
.targets{max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#FBFCFD}
.targets .lvl{font-size:.72rem;font-weight:800;color:var(--ink);margin:8px 0 2px;text-transform:uppercase;letter-spacing:.5px}
.targets .lvl:first-child{margin-top:0}
.targets label.check{font-weight:400;color:var(--text);margin:3px 0}
.quickbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
/* Thống kê nhanh trong thẻ báo cáo / hoạt động */
.qsum{margin:10px 0 2px;font-size:.83rem;line-height:1.6;border-top:1px dashed var(--line);padding-top:8px}
.qline{margin:3px 0}
.qline b{font-weight:700}
.qs-ok{color:var(--ok)} .qs-late{color:var(--warn)} .qs-miss{color:var(--stamp)}
.qs-wait{color:var(--muted)} .qs-good{color:var(--ok)} .qs-pass{color:var(--ink)}
.qs-fail{color:var(--warn)} .qs-none{color:var(--stamp)} .qs-un{color:var(--muted)}
.chip{display:inline-block;padding:2px 10px;margin:3px 4px 3px 0;border:1.5px solid;border-radius:14px;font-size:.78rem;font-weight:600;background:#fff;white-space:nowrap}
.chip.qs-ok{color:var(--ok);border-color:var(--ok)}
.chip.qs-late{color:var(--warn);border-color:var(--warn)}
.chip.qs-miss{color:var(--stamp);border-color:var(--stamp)}
.chip.qs-wait{color:var(--muted);border-color:var(--muted)}
.chip.qs-good{color:var(--ok);border-color:var(--ok)}
.chip.qs-pass{color:var(--ink);border-color:var(--ink)}
.chip.qs-fail{color:var(--warn);border-color:var(--warn)}
.chip.qs-none{color:var(--stamp);border-color:var(--stamp)}
.chip.qs-un{color:var(--muted);border-color:var(--muted);border-style:dashed}
/* Chế độ chỉ xem: ẩn mọi nút thao tác, khóa ô đánh giá */
body.viewmode .btn:not(.allow-view){display:none!important}
body.viewmode #btnImport{display:none!important}
body.viewmode table select,body.viewmode table input,body.viewmode .evalnote{pointer-events:none;opacity:.65;background:#F2F3F5}
.viewbadge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600}
/* ===== Bản 15: chế độ trường, cổng nộp báo cáo, lịch hoạt động ===== */
body.schoolmode .toolbar button{display:none}
body.schoolmode .toolbar button.allow-school{display:inline-block}
.modal.wide{max-width:680px}
/* Bản 17: đợt báo cáo KHẨN — hiện đỏ, ưu tiên hoàn thành sớm */
.card.urgent{border:2px solid var(--stamp);background:#FDF3F2;box-shadow:0 0 0 3px rgba(179,55,46,.08)}
.urgentbadge{display:inline-block;vertical-align:middle;background:var(--stamp);color:#fff;padding:2px 10px;border-radius:6px;font-size:.7rem;font-weight:800;letter-spacing:.8px;margin-left:8px;animation:urgentBlink 1.3s ease-in-out infinite}
@keyframes urgentBlink{0%,100%{opacity:1}50%{opacity:.55}}
.guidebox{background:#FBF6E9;border:1px solid #E7D9AE;border-radius:8px;padding:10px 12px;font-size:.86rem;white-space:pre-wrap;margin:8px 0 4px;line-height:1.6}
.maxnote{color:var(--warn);font-weight:700;font-size:.78rem;margin-top:4px}
.filechip{display:inline-block;border:1px solid var(--line);border-radius:14px;padding:2px 10px;font-size:.78rem;margin:2px 4px 2px 0;background:#fff;white-space:nowrap}
.filechip a{color:var(--ink);text-decoration:none;font-weight:600}
.filechip a:hover{text-decoration:underline}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:6px 0 12px}
.cal .dow{font-size:.66rem;font-weight:800;color:var(--muted);text-align:center;text-transform:uppercase;padding:2px 0}
.calday{min-height:64px;border:1px solid var(--line);border-radius:8px;padding:4px 5px;font-size:.7rem;background:#fff;cursor:pointer;overflow:hidden}
.calday:hover{border-color:var(--ink)}
.calday.off{background:transparent;border-style:dashed;opacity:.4;cursor:default}
.calday.today{border-color:var(--ink);border-width:2px}
.calday.sel{outline:2px solid var(--stamp)}
.calday b{font-size:.78rem;color:var(--text)}
.calday .cnt{float:right;background:var(--ink);color:#fff;border-radius:10px;padding:0 6px;font-weight:700;font-size:.68rem}
.calmini{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink);margin-top:1px}
.tag.phong{background:var(--stamp);color:#fff}
.soonflag{color:var(--warn);font-weight:700;font-size:.76rem;margin-left:6px}
.actitem{border-bottom:1px dashed var(--line);padding:10px 2px}
.actitem:last-child{border-bottom:none}
.actdate{display:inline-block;background:#E8EEF8;color:var(--ink);border-radius:8px;padding:2px 9px;font-weight:800;font-size:.8rem;margin-right:6px}
/* Dòng thông tin đợt nộp: hạn nộp nổi bật + chip đối tượng */
.rmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:6px}
.rmeta .pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:.82rem;font-weight:700;white-space:nowrap}
.pill.dl{background:#FDECEA;color:var(--stamp);border:1.5px solid #F1B7B0}
.pill.dl.over{background:var(--stamp);color:#fff;border-color:var(--stamp)}
.pill.tg{background:#E8EEF8;color:var(--ink);border:1.5px solid #BFD0E8}
.pill.done{background:#E6F2EA;color:var(--ok);border:1.5px solid #B5DCC3}
.pill .ic{font-size:.9rem}
/* ===== Banner ảnh bìa phường (hiện trọn ảnh, không cắt) ===== */
.cover{width:100%;background:#0B2E63;line-height:0}
.cover img{width:100%;height:auto;display:block}
@media(max-width:640px){
  th,td{padding:6px}
  .hidemobile{display:none}
  .notes-cell{max-width:150px}
  .calday{min-height:44px}
  .calmini{display:none}
}
</style>
</head>

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const thisMonth=()=>today().slice(0,7);
const fmt=d=>{if(!d)return'';const[y,m,dd]=d.split('-');return dd+'/'+m+'/'+y};
const fmtMonth=m=>{if(!m)return'';const[y,mm]=m.split('-');return'tháng '+mm+'/'+y};
const schoolName=id=>{const s=data.schools.find(x=>x.id===id);return s?s.name:'(đã xóa)'};
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const LEVEL_ORDER={'Mầm non':1,'Tiểu học':2,'THCS':3,'THPT':4,'Liên cấp':5};
function schoolsSorted(){return [...data.schools].sort((a,b)=>(LEVEL_ORDER[a.level]||9)-(LEVEL_ORDER[b.level]||9)||a.name.localeCompare(b.name,'vi'))}
function levelsPresent(){
  const set=[...new Set(data.schools.map(s=>s.level||'Khác'))];
  return set.sort((a,b)=>(LEVEL_ORDER[a]||9)-(LEVEL_ORDER[b]||9));
}
const schoolLevel=id=>{const s=data.schools.find(x=>x.id===id);return s?(s.level||''):''};
// Đối tượng đề nghị: obj.targets = mảng id trường; rỗng/không có = tất cả (tương thích dữ liệu cũ)
function isTarget(obj,sid){return !obj.targets||!obj.targets.length||obj.targets.includes(sid)}
function targetSchools(obj){return obj.targets&&obj.targets.length?schoolsSorted().filter(s=>obj.targets.includes(s.id)):schoolsSorted()}
function targetPickerHTML(selected){
  const sel=selected&&selected.length?new Set(selected):null;
  const byLevel={};
  schoolsSorted().forEach(s=>{const lv=s.level||'Khác';(byLevel[lv]=byLevel[lv]||[]).push(s)});
  let boxes='';
  Object.entries(byLevel).forEach(([lv,arr])=>{
    boxes+='<div class="lvl">'+esc(lv)+'</div>';
    arr.forEach(s=>{
      boxes+='<label class="check"><input type="checkbox" class="tgbox" data-level="'+esc(lv)+'" value="'+s.id+'" '+((!sel||sel.has(s.id))?'checked':'')+'> '+esc(s.name)+'</label>';
    });
  });
  let quick='<button type="button" class="btn sm ghost" onclick="tgAll(true)">Chọn tất cả</button><button type="button" class="btn sm ghost" onclick="tgAll(false)">Bỏ chọn</button>';
  levelsPresent().forEach(lv=>{quick+='<button type="button" class="btn sm ghost" onclick="tgOnlyLevel(\''+lv+'\')">Chỉ '+esc(lv)+'</button>'});
  return '<div class="field"><label>Đối tượng đề nghị *</label><div class="quickbtns">'+quick+'</div><div class="targets">'+boxes+'</div><div class="note">Chỉ các trường được chọn mới xuất hiện trong bảng theo dõi và được tính điểm thi đua.</div></div>';
}
function tgAll(v){document.querySelectorAll('.tgbox').forEach(b=>b.checked=v)}
function tgOnlyLevel(lv){document.querySelectorAll('.tgbox').forEach(b=>{b.checked=(b.dataset.level===lv)})}
function readTargets(){return [...document.querySelectorAll('.tgbox:checked')].map(b=>b.value)}

/* ================== ĐIỀU HƯỚNG ================== */
let view='dash';
function go(v){
  view=v;
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+v).classList.add('active');
  render();
}
function render(){
  const el=document.getElementById('app');
  if(isSchool()&&!['portal','acts','feedback'].includes(view))view='portal';
  if(view==='dash')el.innerHTML=renderDash();
  if(view==='schools')el.innerHTML=renderSchools();
  if(view==='reports')el.innerHTML=renderReports();
  if(view==='upper')el.innerHTML=renderUpper();
  if(view==='own')el.innerHTML=renderOwn();
  if(view==='logs')el.innerHTML=renderLogs();
  if(view==='stats')el.innerHTML=renderStats();
  if(view==='portal')el.innerHTML=renderSchoolPortal();
  if(view==='acts')el.innerHTML=renderCalendar();
  if(view==='feedback')el.innerHTML=renderFeedback();
}

/* ================== TRẠNG THÁI NỘP BÁO CÁO ================== */
function subStatus(report,schoolId){
  const sub=(report.subs||{})[schoolId];
  if(sub&&sub.date){
    return (report.deadline&&sub.date>report.deadline)?'late':'ok';
  }
  return (report.deadline&&today()>report.deadline)?'miss':'wait';
}
// Thẻ nào đang xổ chi tiết
const expanded=new Set();
function toggleCard(k){expanded.has(k)?expanded.delete(k):expanded.add(k);render()}
// Dựng khối thống kê nhanh: [[nhãn, lớp màu, mảng tên trường], ...]
function qsumHTML(items){
  const lines=items.filter(it=>it[2].length).map(it=>
    `<div class="qline"><b class="${it[1]}">${it[0]} (${it[2].length}):</b><br>${it[2].map(n=>'<span class="chip '+it[1]+'">'+esc(n)+'</span>').join('')}</div>`
  ).join('');
  return lines?'<div class="qsum">'+lines+'</div>':'';
}

  ok:'<span class="stamp ok">Đã nộp</span>',
  late:'<span class="stamp late">Nộp trễ</span>',
  miss:'<span class="stamp miss">Quá hạn</span>',
  wait:'<span class="stamp wait">Chưa nộp</span>'
};

/* ================== TỔNG QUAN ================== */
function renderDash(){
  const nSchools=data.schools.length;
  const month=thisMonth();
  const vio=data.logs.filter(l=>l.type==='vio'&&l.date.startsWith(month)).length;
  const merit=data.logs.filter(l=>l.type==='merit'&&l.date.startsWith(month)).length;
  const upperCount=data.upperActs.filter(a=>(a.date||'').startsWith(month)).length;
  const ownCount=data.ownActs.filter(a=>(a.date||'').startsWith(month)).length;

  let latestHTML='<div class="empty"><b>Chưa có đợt báo cáo nào</b>Vào mục "Báo cáo" để tạo đợt nộp online đầu tiên.</div>';
  if(portal.loaded&&portal.rounds.length){
    const latest=sortRounds(portal.rounds)[0]; // đợt cần chú ý nhất: khẩn / gần đến hạn nhất
    const tg=pTargets(latest);
    const done=tg.filter(s=>['ok','late'].includes(pStatus(latest,s.id))).length;
    const pct=Math.round(done/(tg.length||1)*100);
    const missing=tg.filter(s=>pStatus(latest,s.id)==='miss');
    latestHTML=`
      <p><b>${esc(latest.title)}</b>${latest.urgent?' <span class="urgentbadge">🔥 KHẨN</span>':''} — hạn nộp <b style="color:var(--stamp)">${fmtDeadline(latest.deadline,latest.dtime)}</b> · <span class="note">nộp online</span></p>
      <div class="progressbar"><i style="width:${pct}%"></i></div>
      <p class="note">${done}/${tg.length} trường thuộc đối tượng đã nộp (${pct}%)</p>
      ${missing.length?'<p class="note" style="color:var(--stamp)">⚠ Quá hạn chưa nộp: '+missing.map(s=>esc(s.name)).join(', ')+'</p>':''}
    `;
  }else{
    const reports=[...data.reports].sort((a,b)=>(b.deadline||'').localeCompare(a.deadline||''));
    const latest=reports[0];
    if(latest&&nSchools){
      const tg=targetSchools(latest);
      const done=tg.filter(s=>['ok','late'].includes(subStatus(latest,s.id))).length;
      const pct=Math.round(done/(tg.length||1)*100);
      const missing=tg.filter(s=>subStatus(latest,s.id)==='miss');
      latestHTML=`
        <p><b>${esc(latest.title)}</b> — hạn nộp ${fmt(latest.deadline)||'(không đặt)'}</p>
        <div class="progressbar"><i style="width:${pct}%"></i></div>
        <p class="note">${done}/${tg.length} trường thuộc đối tượng đã nộp (${pct}%)</p>
        ${missing.length?'<p class="note" style="color:var(--stamp)">⚠ Quá hạn chưa nộp: '+missing.map(s=>esc(s.name)).join(', ')+'</p>':''}
      `;
    }
  }

  const recent=[...data.logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const tagHTML={act:'<span class="tag act">Hoạt động</span>',vio:'<span class="tag vio">Vi phạm</span>',merit:'<span class="tag merit">Ưu điểm</span>'};
  const recentHTML=recent.length?'<table><tbody>'+recent.map(l=>
    `<tr><td style="white-space:nowrap">${fmt(l.date)}</td><td>${tagHTML[l.type]}${l.critical?' <span class="stamp crit">Liệt</span>':''}</td><td><b>${esc(schoolName(l.schoolId))}</b><br>${esc(l.content)}</td></tr>`
  ).join('')+'</tbody></table>':'<div class="empty"><b>Chưa có ghi chép nào</b>Vào mục "Nhật ký" để ghi nhận vi phạm, ưu điểm.</div>';

  return `
    ${storageOK?'':'<div class="card" style="border-color:var(--warn)"><b style="color:var(--warn)">⚠ Trình duyệt này không lưu được dữ liệu.</b> Hãy mở file trên máy tính hoặc trên GitHub Pages, và nhớ bấm "Sao lưu dữ liệu" thường xuyên.</div>'}
    ${fbPendingBanner()}
    <div class="grid">
      <div class="stat"><b>${nSchools}</b><span>Trường theo dõi</span></div>
      <div class="stat"><b>${upperCount}</b><span>Tham gia HĐ tháng này</span></div>
      <div class="stat"><b>${ownCount}</b><span>HĐ tổ chức tháng này</span></div>
      <div class="stat red"><b>${vio}</b><span>Vi phạm tháng này</span></div>
      <div class="stat green"><b>${merit}</b><span>Ưu điểm tháng này</span></div>
    </div>
    <div class="card" style="margin-top:14px"><h2>Đợt báo cáo gần nhất</h2>${latestHTML}</div>
    <div class="card"><h2>Ghi chép gần đây</h2>${recentHTML}</div>
  `;
}
// Banner nhắc số kiến nghị chưa xử lý (chỉ hiện cho Phòng khi có việc tồn)
function fbPendingBanner(){
  if(isView()||isSchool())return '';
  if(!portal.loaded||!portal.feedback)return '';
  const pending=portal.feedback.filter(f=>(f.status||'new')!=='done').length;
  if(!pending)return '';
  return `<div class="card" style="border-color:var(--warn);background:#FFF8EC;cursor:pointer" onclick="go('feedback')">
    <b style="color:var(--warn)">📣 Có ${pending} kiến nghị – phản ánh chưa xử lý.</b>
    <span class="note"> Bấm để xem và phản hồi cho các trường.</span></div>`;
}

function renderSchools(){
  const rows=schoolsSorted().map(s=>`
    <tr>
      <td><b>${esc(s.name)}</b><br><span class="note">${esc(s.level||'')}${s.address?' · '+esc(s.address):''}</span></td>
      <td class="hidemobile">${esc(s.principal||'')}</td>
      <td class="hidemobile">${esc(s.phone||'')}${s.email?'<br><span class="note">'+esc(s.email)+'</span>':''}</td>
      <td><div class="rowactions">
        <button class="btn sm ghost" onclick="openSchoolForm('${s.id}')">Sửa</button>
        <button class="btn sm danger" onclick="delSchool('${s.id}')">Xóa</button>
      </div></td>
    </tr>`).join('');
  return `
    <div class="topline">
      <h2 style="color:var(--ink)">Danh sách trường (${data.schools.length})</h2>
      <button class="btn" onclick="openSchoolForm()">+ Thêm trường</button>
    </div>

async function saveUpper(id){
  const title=document.getElementById('f_title').value.trim();
  if(!title){alert('Vui lòng nhập tên hoạt động');return}
  const date=document.getElementById('f_date').value||today();
  const time=document.getElementById('f_time').value;
  const place=document.getElementById('f_place').value.trim();
  const note=document.getElementById('f_note').value.trim();
  const targets=readTargets();
  const onCal=document.getElementById('f_oncal').checked;
  if(!targets.length){alert('Vui lòng chọn ít nhất 1 trường thuộc đối tượng đề nghị.');return}
  let actId=id;
  if(id){const a=data.upperActs.find(x=>x.id===id);a.title=title;a.date=date;a.time=time;a.place=place;a.note=note;a.targets=targets;a.onCal=onCal}
  else{actId=uid();data.upperActs.push({id:actId,title,date,time,place,note,targets,onCal,evals:{}})}
  save();closeModal();render();
  // Đồng bộ trạng thái hiện-trên-lịch lên máy chủ để trường & lãnh đạo cũng thấy
  await syncUpperCal(actId);
}
// Đẩy trạng thái onCal của 1 HĐ cấp trên lên sheet ACTS (hiện cho mọi vai trò)
async function syncUpperCal(id){
  if(!syncOn())return;
  const a=data.upperActs.find(x=>x.id===id);
  if(!a)return;
  try{
    await api('upper_cal',{upperId:id,on:a.onCal?1:0,title:a.title,date:a.date,time:a.time||'',place:a.place||'',note:a.note||''});
    await portalLoad(true);
  }catch(e){/* im lặng, lần đồng bộ sau sẽ cập nhật */}
}
async function delUpper(id){
  if(!confirm('Xóa hoạt động này cùng toàn bộ đánh giá?'))return;
  const a=data.upperActs.find(x=>x.id===id);
  const wasOnCal=a&&a.onCal;
  data.upperActs=data.upperActs.filter(x=>x.id!==id);save();render();
  // Nếu đang hiện trên lịch thì gỡ khỏi máy chủ luôn
  if(wasOnCal&&syncOn()){try{await api('upper_cal',{upperId:id,on:0});await portalLoad(true)}catch(e){}}
}
// Bật/tắt nhanh việc hiện HĐ cấp trên lên Lịch hoạt động
async function toggleUpperCal(id){
  const a=data.upperActs.find(x=>x.id===id);
  if(!a)return;
  a.onCal=!a.onCal;
  save();render();
  await syncUpperCal(id);
}
function setUpperEval(aid,sid,val){
  if(isView())return;
  const a=data.upperActs.find(x=>x.id===aid);
  a.evals=a.evals||{};
  a.evals[sid]=a.evals[sid]||{};
  a.evals[sid].r=val;
  save();render();
}
function setUpperNote(aid,sid,val){
  if(isView())return;
  const a=data.upperActs.find(x=>x.id===aid);
  a.evals=a.evals||{};
  a.evals[sid]=a.evals[sid]||{};
  a.evals[sid].note=val.trim();
  save();
}

let statsYear=+thisMonth().slice(0,4);
let statsQ=Math.ceil(+thisMonth().slice(5,7)/3);
// Năm học: bắt đầu tháng 9 — nếu đang từ tháng 9 trở đi thì năm học bắt đầu năm nay, ngược lại là năm trước
let statsSYear=+thisMonth().slice(5,7)>=9?+thisMonth().slice(0,4):+thisMonth().slice(0,4)-1;
let statsFrom=statsSYear+'-09-01';
let statsTo=today();

// Trả về khoảng ngày {from, to} của kỳ thống kê
function statsRange(){
  if(statsMode==='month')return{from:statsMonth+'-01',to:statsMonth+'-31'};
  if(statsMode==='quarter'){
    const m1=(statsQ-1)*3+1;
    return{from:statsYear+'-'+String(m1).padStart(2,'0')+'-01',to:statsYear+'-'+String(m1+2).padStart(2,'0')+'-31'};
  }
  if(statsMode==='schoolyear')return{from:statsSYear+'-09-01',to:(statsSYear+1)+'-08-31'};
  if(statsMode==='year')return{from:statsYear+'-01-01',to:statsYear+'-12-31'};
  return{from:statsFrom<=statsTo?statsFrom:statsTo,to:statsFrom<=statsTo?statsTo:statsFrom};
}
function statsLabel(){
  if(statsMode==='month')return fmtMonth(statsMonth);
  if(statsMode==='quarter')return'quý '+statsQ+'/'+statsYear;
  if(statsMode==='schoolyear')return'năm học '+statsSYear+'–'+(statsSYear+1);
  if(statsMode==='year')return'năm '+statsYear;
  const r=statsRange();
  return'từ '+fmt(r.from)+' đến '+fmt(r.to);
}
function statsSuffix(){
  if(statsMode==='month')return statsMonth;
  if(statsMode==='quarter')return statsYear+'-quy'+statsQ;
  if(statsMode==='schoolyear')return'namhoc-'+statsSYear+'-'+(statsSYear+1);
  if(statsMode==='year')return String(statsYear);
  const r=statsRange();
  return r.from+'_den_'+r.to;
}
// d nằm trong khoảng ngày r (so sánh chuỗi ISO an toàn)
const inPeriod=(d,r)=>!!d&&d>=r.from&&d<=r.to;

// Tính điểm 1 trường trong kỳ (px = danh sách tiền tố tháng)
function scoreSchool(s,px){
  let bc=portalReportPts(s.id,px); // điểm từ các đợt nộp online (Bản 15)
  data.reports.filter(r=>inPeriod(r.deadline,px)&&isTarget(r,s.id)).forEach(r=>{
    const st=subStatus(r,s.id);
    if(st==='ok')bc+=2;
    else if(st==='late')bc+=1;
  });
  let ct=0;
  data.upperActs.filter(a=>inPeriod(a.date,px)&&isTarget(a,s.id)).forEach(a=>{
    const ev=(a.evals||{})[s.id];
    if(ev&&ev.r)ct+=UPPER_R[ev.r].pts;
  });
  let tt=0;
  data.ownActs.filter(a=>inPeriod(a.date,px)&&a.schoolId===s.id).forEach(a=>{
    if(OWN_R[a.rating])tt+=OWN_R[a.rating].pts;
  });
  const merits=data.logs.filter(l=>l.type==='merit'&&l.schoolId===s.id&&inPeriod(l.date,px));
  const vios=data.logs.filter(l=>l.type==='vio'&&l.schoolId===s.id&&inPeriod(l.date,px));
  const critical=vios.some(v=>v.critical);
  const total=bc+ct+tt+merits.length-vios.length;
  return {bc,ct,tt,merits,vios,critical,total};
}

function renderStats(){
  const px=statsRange();
  const levels=levelsPresent();
  const sections=levels.map(lv=>{
    const schools=schoolsSorted().filter(s=>(s.level||'Khác')===lv);
    if(!schools.length)return'';
    const scored=schools.map(s=>({s,...scoreSchool(s,px)}));
    // Xếp hạng: điểm liệt xuống cuối, còn lại theo tổng điểm giảm dần
    scored.sort((a,b)=>(a.critical?1:0)-(b.critical?1:0)||b.total-a.total);
    const rows=scored.map((x,i)=>{
      const notes=[
        ...x.merits.map(l=>'<div class="m">+ '+esc(l.content)+'</div>'),
        ...x.vios.map(l=>'<div class="v">− '+esc(l.content)+(l.critical?' <b>(LIỆT)</b>':'')+'</div>')
      ].join('');
      return `<tr>
        <td class="num ${i===0&&!x.critical&&x.total>0?'rank1':''}">${i+1}</td>
        <td><b>${esc(x.s.name)}</b>${x.critical?'<br><span class="stamp crit">Điểm liệt</span>':''}</td>
        <td class="num">${x.bc}</td>
        <td class="num">${x.ct}</td>
        <td class="num">${x.tt}</td>
        <td class="num scorepos">${x.merits.length?'+'+x.merits.length:'·'}</td>
        <td class="num scoreneg">${x.vios.length?'−'+x.vios.length:'·'}</td>
        <td class="num"><b>${x.total}</b></td>
        <td class="notes-cell">${notes||'<span class="note">—</span>'}</td>
      </tr>`;
    }).join('');
    return `<div class="card">
      <h2>${esc(lv)} (${schools.length} trường)</h2>
      <div style="overflow-x:auto"><table>
        <thead><tr><th class="num">Hạng</th><th>Trường</th><th class="num" title="Báo cáo">BC</th><th class="num" title="Tham gia hoạt động">Th/Gia HĐ</th><th class="num" title="Tổ chức hoạt động">Lịch HĐ</th><th class="num">Ưu điểm</th><th class="num">Vi phạm</th><th class="num">Tổng</th><th>Ghi chú ưu điểm / vi phạm</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');
  return `
    <div class="topline">
      <h2 style="color:var(--ink)">Thống kê thi đua ${statsLabel()}</h2>
      <div class="filters">
        <select onchange="statsMode=this.value;render()">
          <option value="month" ${statsMode==='month'?'selected':''}>Theo tháng</option>
          <option value="quarter" ${statsMode==='quarter'?'selected':''}>Theo quý</option>
          <option value="schoolyear" ${statsMode==='schoolyear'?'selected':''}>Theo năm học</option>
          <option value="year" ${statsMode==='year'?'selected':''}>Theo năm dương lịch</option>
          <option value="range" ${statsMode==='range'?'selected':''}>Tùy chọn khoảng thời gian</option>
        </select>
        ${statsMode==='month'?`<input type="month" value="${statsMonth}" onchange="statsMonth=this.value||statsMonth;render()">`:''}
        ${statsMode==='quarter'?`<select onchange="statsQ=+this.value;render()">${[1,2,3,4].map(q=>`<option value="${q}" ${statsQ===q?'selected':''}>Quý ${q}</option>`).join('')}</select><input type="number" min="2000" max="2100" value="${statsYear}" style="width:92px" onchange="statsYear=+this.value||statsYear;render()">`:''}
        ${statsMode==='schoolyear'?`<select onchange="statsSYear=+this.value;render()">${[-2,-1,0,1].map(i=>{const y=statsSYear+i;return`<option value="${y}" ${i===0?'selected':''}>Năm học ${y}–${y+1}</option>`}).join('')}</select>`:''}
        ${statsMode==='year'?`<input type="number" min="2000" max="2100" value="${statsYear}" style="width:92px" onchange="statsYear=+this.value||statsYear;render()">`:''}
        ${statsMode==='range'?`<label style="margin:0;display:flex;align-items:center;gap:5px">Từ <input type="date" value="${statsFrom}" onchange="statsFrom=this.value||statsFrom;render()" style="width:auto"></label><label style="margin:0;display:flex;align-items:center;gap:5px">đến <input type="date" value="${statsTo}" onchange="statsTo=this.value||statsTo;render()" style="width:auto"></label>`:''}
        <button class="btn allow-view" onclick="exportDetailXLSX()">⬇ Xuất Excel chi tiết</button>
        <button class="btn ghost allow-view" onclick="exportStatsCSV()">⬇ Bảng điểm (CSV)</button>
      </div>
    </div>
    <div class="legend">
      <b>Cách tính điểm:</b> Báo cáo đúng hạn +2, trễ +1, không nộp 0 (tính theo hạn nộp trong kỳ) ·
      Tham gia hoạt động: Tốt +3, Đạt +2, Chưa đạt +1, Không tham gia 0 ·
      Tổ chức hoạt động: Xuất sắc +3, Tốt +2, Đạt +1 ·
      Ưu điểm +1/lần · Vi phạm −1/lần ·
      Trường có <b style="color:var(--stamp)">vi phạm điểm liệt</b> xếp cuối bảng bậc học trong kỳ.
      Xếp hạng so sánh <b>riêng từng bậc học</b>, chỉ tính các đợt mà trường <b>thuộc đối tượng đề nghị</b>.
    </div>
    ${sections||'<div class="card"><div class="empty">Chưa có trường học nào.</div></div>'}
  `;
}

function rankingRows(){
  const px=statsRange();
  const rows=[['Bậc học','Hạng','Trường','Báo cáo','Tham gia HĐ','Lịch HĐ','Ưu điểm','Vi phạm','Tổng điểm','Điểm liệt','Ghi chú']];
  levelsPresent().forEach(lv=>{
    const schools=schoolsSorted().filter(s=>(s.level||'Khác')===lv);
    const scored=schools.map(s=>({s,...scoreSchool(s,px)}));
    scored.sort((a,b)=>(a.critical?1:0)-(b.critical?1:0)||b.total-a.total);
    scored.forEach((x,i)=>{
      const notes=[...x.merits.map(l=>'+ '+l.content),...x.vios.map(l=>'- '+l.content+(l.critical?' (LIỆT)':''))].join(' | ');
      rows.push([lv,i+1,x.s.name,x.bc,x.ct,x.tt,x.merits.length,x.vios.length,x.total,x.critical?'CÓ':'',notes]);
    });
  });
  return rows;
}
function exportStatsCSV(){
  const rows=rankingRows();
  const csv='\uFEFF'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='thong-ke-thi-dua-'+statsSuffix()+'.csv';
  a.click();
}
const STATUS_LABEL={ok:'Đã nộp',late:'Nộp trễ',miss:'Quá hạn',wait:'Chưa nộp'};
// Hồ sơ chi tiết từng trường trong kỳ — mỗi trường một khối liền nhau
function schoolSummaryRows(px){
  const sum=[['Mục','Nội dung','Thời gian','Kết quả','Ghi chú']];
  const rankMap={};
  levelsPresent().forEach(lv=>{
    const arr=schoolsSorted().filter(s=>(s.level||'Khác')===lv).map(s=>({s,...scoreSchool(s,px)}));
    arr.sort((a,b)=>(a.critical?1:0)-(b.critical?1:0)||b.total-a.total);
    arr.forEach((x,i)=>rankMap[x.s.id]={rank:i+1,of:arr.length,total:x.total,critical:x.critical});
  });
  schoolsSorted().forEach(s=>{
    const r=rankMap[s.id]||{rank:'',of:'',total:0,critical:false};
    sum.push(['■ '+s.name.toUpperCase(),'Bậc học: '+(s.level||''),'','Tổng điểm: '+r.total+' — Hạng '+r.rank+'/'+r.of+' '+(s.level||''),r.critical?'CÓ ĐIỂM LIỆT':'']);
    if(portal.loaded){
      portal.rounds.filter(rp=>inPeriod(rp.deadline,px)&&(!rp.targets.length||rp.targets.includes(s.id))).forEach(rp=>{
        const st=pStatus(rp,s.id),sub=pSub(rp.id,s.id);
        sum.push(['Báo cáo (online)',rp.title,'Hạn '+fmt(rp.deadline),STATUS_LABEL[st]+(sub?' lúc '+fmtTime(sub.time):''),sub&&sub.byAdmin?'Phòng nộp thay':'']);
      });
    }
    const reps=data.reports.filter(rp=>inPeriod(rp.deadline,px)&&isTarget(rp,s.id));
    if(reps.length){
      reps.forEach(rp=>{
        const st=subStatus(rp,s.id),sub=(rp.subs||{})[s.id];
        sum.push(['Báo cáo',rp.title,'Hạn '+fmt(rp.deadline),STATUS_LABEL[st]+(sub&&sub.date?' ngày '+fmt(sub.date):''),'']);
      });
    }else{sum.push(['Báo cáo','(Không thuộc đối tượng đợt báo cáo nào trong kỳ)','','',''])}
    const ups=data.upperActs.filter(a=>inPeriod(a.date,px)&&isTarget(a,s.id));
    if(ups.length){
      ups.forEach(a=>{
        const ev=(a.evals||{})[s.id];
        sum.push(['Tham gia HĐ',a.title+(a.place?' — '+a.place:''),fmt(a.date)+(a.time?' '+a.time:''),ev&&ev.r?UPPER_R[ev.r].label:'Chưa đánh giá',ev&&ev.note?ev.note:'']);
      });
    }else{sum.push(['Tham gia HĐ','(Không thuộc đối tượng hoạt động nào trong kỳ)','','',''])}
    const owns=data.ownActs.filter(a=>inPeriod(a.date,px)&&a.schoolId===s.id);
    if(owns.length){
      owns.forEach(a=>sum.push(['Lịch HĐ',a.title,fmt(a.date),OWN_R[a.rating]?OWN_R[a.rating].label:'',a.note||'']));
    }else{sum.push(['Lịch HĐ','(Không ghi nhận hoạt động nổi bật nào)','','',''])}
    const ms=data.logs.filter(l=>l.type==='merit'&&l.schoolId===s.id&&inPeriod(l.date,px));
    if(ms.length){ms.forEach(l=>sum.push(['Ưu điểm',l.content,fmt(l.date),'+1','']))}
    else{sum.push(['Ưu điểm','(Không có)','','',''])}
    const vs=data.logs.filter(l=>l.type==='vio'&&l.schoolId===s.id&&inPeriod(l.date,px));
    if(vs.length){vs.forEach(l=>sum.push(['Vi phạm',l.content,fmt(l.date),l.critical?'−1 (ĐIỂM LIỆT)':'−1','']))}
    else{sum.push(['Vi phạm','(Không có)','','',''])}
    sum.push(['','','','','']);
  });
  return sum;
}
function exportDetailXLSX(){
  if(typeof XLSX==='undefined'){
    alert('Không tải được thư viện Excel (cần kết nối mạng). Sẽ xuất bảng điểm dạng CSV thay thế.');
    exportStatsCSV();return;
  }
  const px=statsRange();
  const wb=XLSX.utils.book_new();
  const INK='1B3A6B',RED='B3372E',GRN='2E7D4F',AMB='B07D1F';
  const add=(rows,name,opts)=>{
    opts=opts||{};
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=rows[0].map((_,c)=>({wch:Math.min(45,Math.max(...rows.map(r=>String(r[c]??'').length))+2)}));
    const range=XLSX.utils.decode_range(ws['!ref']);
    const thin={style:'thin',color:{rgb:'C9D0D8'}};
    for(let R=range.s.r;R<=range.e.r;R++){
      const rowVals=rows[R]||[];
      const isBlank=rowVals.every(v=>String(v??'')==='');
      const isHead=opts.blocks&&String(rowVals[0]||'').startsWith('■');
      for(let C=range.s.c;C<=range.e.c;C++){
        const addr=XLSX.utils.encode_cell({r:R,c:C});
        if(!ws[addr]){if(isBlank)continue;ws[addr]={t:'s',v:''}}
        const cell=ws[addr];
        const s={border:{top:thin,bottom:thin,left:thin,right:thin},alignment:{vertical:'top',wrapText:true},font:{name:'Arial',sz:10}};
        if(cell.t==='n')s.alignment.horizontal='center';
        if(R===0){
          s.font={name:'Arial',sz:10,bold:true,color:{rgb:'FFFFFF'}};
          s.fill={fgColor:{rgb:INK}};
          s.alignment={vertical:'center',horizontal:'center',wrapText:true};
        }else if(isHead){
          s.font.bold=true;s.fill={fgColor:{rgb:'E8EEF8'}};
        }
        const v=String(cell.v??'');
        if(R>0){
          if(v==='CÓ'||/Quá hạn|ĐIỂM LIỆT/.test(v)){s.font.color={rgb:RED};s.font.bold=true}
          else if(v==='Vi phạm'||/^−1/.test(v)){s.font.color={rgb:RED}}
          else if(/Nộp trễ|Chưa đạt|Không tham gia|Chưa đánh giá|Chưa nộp/.test(v)){s.font.color={rgb:AMB}}
          else if(v==='Ưu điểm'||v==='+1'||/Đã nộp|^Tốt$|Xuất sắc/.test(v)){s.font.color={rgb:GRN}}
        }
        cell.s=s;
      }
    }
    if(opts.filter)ws['!autofilter']={ref:XLSX.utils.encode_range({s:{r:0,c:0},e:{r:range.e.r,c:range.e.c}})};
    ws['!rows']=[{hpt:26}];
    XLSX.utils.book_append_sheet(wb,ws,name);
  };
  // 1. Xếp hạng thi đua
  add(rankingRows(),'Xếp hạng',{filter:true});
  // 2. Tổng hợp theo trường (hồ sơ từng trường)
  add(schoolSummaryRows(px),'Tổng hợp theo trường',{blocks:true});
  // 2. Báo cáo trong kỳ
  const bc=[['Báo cáo','Hạn nộp','Trường','Bậc học','Trạng thái','Ngày nộp']];
  data.reports.filter(r=>inPeriod(r.deadline,px)).forEach(r=>{
    targetSchools(r).forEach(s=>{
      const st=subStatus(r,s.id),sub=(r.subs||{})[s.id];
      bc.push([r.title,fmt(r.deadline),s.name,s.level||'',STATUS_LABEL[st],sub&&sub.date?fmt(sub.date):'']);
    });
  });
  portalBcRows(px).forEach(row=>bc.push(row)); // các đợt nộp online (Bản 15)
  add(bc,'Báo cáo',{filter:true});
  // 3. HĐ cấp trên trong kỳ
  const ct=[['Hoạt động','Ngày','Giờ','Địa điểm','Trường','Bậc học','Đánh giá','Ghi chú']];
  data.upperActs.filter(a=>inPeriod(a.date,px)).forEach(a=>{
    targetSchools(a).forEach(s=>{
      const ev=(a.evals||{})[s.id];
      ct.push([a.title,fmt(a.date),a.time||'',a.place||'',s.name,s.level||'',ev&&ev.r?UPPER_R[ev.r].label:'Chưa đánh giá',ev&&ev.note?ev.note:'']);
    });
  });
  add(ct,'Tham gia HĐ',{filter:true});
  // 4. HĐ trường tổ chức trong kỳ
  const tt=[['Ngày','Trường','Bậc học','Hoạt động','Đánh giá','Ghi chú']];
  data.ownActs.filter(a=>inPeriod(a.date,px)).sort((a,b)=>a.date.localeCompare(b.date)).forEach(a=>{
    tt.push([fmt(a.date),schoolName(a.schoolId),schoolLevel(a.schoolId),a.title,OWN_R[a.rating]?OWN_R[a.rating].label:'',a.note||'']);
  });
  add(tt,'Lịch HĐ',{filter:true});
  // 5. Nhật ký trong kỳ
  const nk=[['Ngày','Trường','Bậc học','Loại','Điểm liệt','Nội dung']];
  const TYPE_LABEL={act:'Hoạt động',vio:'Vi phạm',merit:'Ưu điểm'};
  data.logs.filter(l=>inPeriod(l.date,px)).sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>{
    nk.push([fmt(l.date),schoolName(l.schoolId),schoolLevel(l.schoolId),TYPE_LABEL[l.type]||'',l.critical?'CÓ':'',l.content]);
  });
  add(nk,'Nhật ký',{filter:true});
  XLSX.writeFile(wb,'theo-doi-truong-'+statsSuffix()+'.xlsx');
}

function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='so-theo-doi-'+today()+'.json';
  a.click();

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const d=JSON.parse(reader.result);
      if(!d.schools||!d.reports||!d.logs)throw 0;
      if(confirm('Khôi phục sẽ thay thế toàn bộ dữ liệu hiện tại. Tiếp tục?')){
        d.upperActs=d.upperActs||[];d.ownActs=d.ownActs||[];
        data=d;save();render();alert('Đã khôi phục dữ liệu thành công.');
      }
    }catch(e){alert('File không hợp lệ. Hãy chọn file sao lưu (.json) đã xuất từ app này.')}
  };
  reader.readAsText(file);
  input.value='';
}

// Tải dữ liệu từ mạng: {status:'ok', data: obj|null} hoặc {status:'error'}
async function pullData(){
  if(!syncOn())return{status:'error'};
  setSyncStatus('↻ Đang tải dữ liệu từ mạng...','#fff');
  try{
    const res=await fetch(sync.url+(sync.url.includes('?')?'&':'?')+'action=load&token='+encodeURIComponent(sync.token));
    const j=await res.json();
    if(!j.ok){
      // Máy chủ trả lời được nhưng từ chối → thường là SAI MÃ (không phải lỗi mạng)
      setSyncStatus('');
      return{status:'denied',error:j.error||'SAI_MA_TRUY_CAP'};
    }
    setSyncStatus('✓ Đã đồng bộ','#B9E4C9');
    return{status:'ok',data:j.data?JSON.parse(j.data):null,role:j.role||'edit',schoolId:j.schoolId||'',schoolName:j.schoolName||''};
  }catch(e){
    // Không gọi được máy chủ (mất mạng, sai URL, chưa cấp quyền "Bất kỳ ai"...)
    setSyncStatus('⚠ Không kết nối được — đang dùng dữ liệu trên máy','#FFB8AD');
    return{status:'error'};
  }
}

// ---- Danh sách trường phục vụ cổng (ưu tiên bản công khai từ máy chủ) ----
function pSchools(){
  const arr=(portal.schools&&portal.schools.length)?portal.schools:data.schools.map(s=>({id:s.id,name:s.name,level:s.level}));
  return [...arr].sort((a,b)=>(LEVEL_ORDER[a.level]||9)-(LEVEL_ORDER[b.level]||9)||a.name.localeCompare(b.name,'vi'));
}
function pName(id){
  if(id==='phong')return 'Phòng Văn hóa - Xã hội';
  if(id==='upper')return 'Hoạt động cấp trên';
  const s=pSchools().find(x=>x.id===id);return s?s.name:id;
}
function pLevel(id){const s=pSchools().find(x=>x.id===id);return s?(s.level||''):''}
function pSub(rid,sid){return portal.subs.find(s=>s.roundId===rid&&s.schoolId===sid)}
function pExt(rid,sid){const e=portal.exts.find(x=>x.roundId===rid&&x.schoolId===sid);return e?e.deadline:''}
function pEff(r,sid){const e=pExt(r.id,sid);return e||r.deadline||''} // hạn hiệu lực (có gia hạn riêng thì ưu tiên)
function pTargets(r){const t=r.targets||[];return pSchools().filter(s=>!t.length||t.includes(s.id))}

// Chuẩn hóa 1 giá trị ngày về "yyyy-MM-dd" (phòng khi dữ liệu cũ là Date thô "Thu Jul 09 2026...")
function dnorm(v){
  if(!v)return '';
  v=String(v);
  if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);   // đã đúng dạng ISO
  const d=new Date(v);                                     // thử parse chuỗi Date thô
  if(!isNaN(d)){
    const p=n=>String(n).padStart(2,'0');
    return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
  }
  return v.slice(0,10);
}

// Trạng thái nộp của 1 trường trong 1 đợt: ok | late | miss | wait
function pStatus(r,sid){
  const sub=pSub(r.id,sid);
  const eff=dnorm(pEff(r,sid));
  const mode=r.mode||'file';
  if(sub&&sub.forcedOk)return 'ok';
  // Xác định đã hoàn thành yêu cầu chưa, tùy hình thức
  const hasFile=sub&&sub.nFiles>0;
  const hasLink=sub&&sub.linkDone;
  let done=false, doneTime='';
  if(mode==='file'){ done=hasFile; doneTime=sub?sub.time:''; }
  else if(mode==='link'){ done=hasLink; doneTime=sub?sub.linkTime:''; }
  else { done=hasFile&&hasLink; // both: cần cả hai
         doneTime=sub?((sub.time>sub.linkTime?sub.time:sub.linkTime)||sub.time||sub.linkTime):''; }
  if(done){
    const day=dnorm(doneTime);
    return (eff&&day&&day>eff)?'late':'ok';
  }
  return (eff&&dnorm(portal.serverToday||today())>eff)?'miss':'wait';
}

// Điểm báo cáo online của 1 trường trong kỳ px (đúng hạn +2, trễ +1)
function portalReportPts(sid,px){
  if(!portal.loaded)return 0;
  let pts=0;
  portal.rounds.filter(r=>inPeriod(r.deadline,px)&&(!r.targets.length||r.targets.includes(sid))).forEach(r=>{
    const st=pStatus(r,sid);
    if(st==='ok')pts+=2;else if(st==='late')pts+=1;
  });
  return pts;
}
// Dòng dữ liệu cho sheet "Báo cáo" khi xuất Excel
function portalBcRows(px){
  const rows=[];
  if(!portal.loaded)return rows;
  const modeLabel={file:'Nộp file',link:'Nhập link',both:'File & Link'};
  portal.rounds.filter(r=>inPeriod(r.deadline,px)).forEach(r=>{
    pTargets(r).forEach(s=>{
      const st=pStatus(r,s.id),sub=pSub(r.id,s.id);
      const mode=r.mode||'file';
      let tinfo='';
      if(sub){
        if(mode==='link')tinfo=sub.linkDone?fmtTime(sub.linkTime):'';
        else if(mode==='both')tinfo=[sub.nFiles?('file: '+fmtTime(sub.time)):'',sub.linkDone?('link: '+fmtTime(sub.linkTime)):''].filter(Boolean).join(' · ');
        else tinfo=sub.nFiles?fmtTime(sub.time):'';
      }
      rows.push([r.title+' ('+(modeLabel[mode]||'online')+')',fmt(r.deadline),s.name,s.level||'',STATUS_LABEL[st],tinfo]);
    });
  });
  return rows;
}

function fmtTime(iso){
  if(!iso)return '';
  const s=String(iso);
  const d=dnorm(s);
  // lấy giờ:phút nếu có trong chuỗi ISO; nếu là Date thô thì thử parse
  let t='';
  const m=s.match(/[T ](\d{2}:\d{2})/);
  if(m)t=m[1];
  else{const dd=new Date(s);if(!isNaN(dd)){const p=n=>String(n).padStart(2,'0');const hh=p(dd.getHours()),mi=p(dd.getMinutes());if(hh!=='00'||mi!=='00')t=hh+':'+mi;}}
  return fmt(d)+(t?' '+t:'');
}
// Giờ dạng "11h30" (bỏ phút nếu tròn giờ -> "11h")
function fmtHour(t){
  if(!t)return '';
  const [h,m]=t.split(':');
  return (m&&m!=='00')?h+'h'+m:h+'h';
}
// Hạn nộp gọn: "11h30 - 25/07/2026" (kèm giờ nếu có)
function fmtDeadline(dateStr,timeStr){
  if(!dateStr)return 'chưa đặt';
  const gio=fmtHour(timeStr);
  return (gio?gio+' - ':'')+fmt(dateStr);
}
function daysLeft(d){
  if(!d)return null;
  const base=portal.serverToday||today();
  return Math.round((new Date(d)-new Date(base))/86400000);
}
// Bản 17 — Sắp xếp danh sách đợt báo cáo:
// 1) Đợt KHẨN luôn xếp trên cùng;
// 2) Đợt còn hạn: ngày đến hạn càng GẦN càng xếp trên (tăng dần);
// 3) Đợt đã qua hạn: xếp sau, đợt mới qua hạn gần đây xếp trước;
// 4) Đợt không đặt hạn: xếp cuối.
function sortRounds(arr){
  const t=dnorm(portal.serverToday||today());
  const rank=r=>{const d=dnorm(r.deadline);return !d?3:(d>=t?1:2)};
  return [...arr].sort((a,b)=>{
    const u=(b.urgent?1:0)-(a.urgent?1:0); if(u)return u;
    const ra=rank(a),rb=rank(b); if(ra!==rb)return ra-rb;
    const da=dnorm(a.deadline),db=dnorm(b.deadline);
    if(ra===1)return da.localeCompare(db);   // còn hạn: gần nhất lên trên
    if(ra===2)return db.localeCompare(da);   // quá hạn: mới qua hạn xếp trước
    return 0;
  });
}
function readB64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(String(r.result).split(',')[1]);
    r.onerror=()=>reject(new Error('read'));
    r.readAsDataURL(file);
  });
}
// Kiểm tra dung lượng trước khi gửi; trả về mảng file quá lớn
function checkFiles(files){
  const max=portal.maxMb||25;
  return [...files].filter(f=>f.size>max*1024*1024);
}
// Tải tuần tự nhiều file lên 1 đối tượng (đợt hoặc hoạt động)
async function uploadSeq(files,sender,msgId){
  const arr=[...files];
  for(let i=0;i<arr.length;i++){
    const f=arr[i];
    setUplMsg(msgId,'Đang gửi tệp '+(i+1)+'/'+arr.length+': '+f.name+' ...');
    const data64=await readB64(f);
    const j=await sender({first:i===0,file:{name:f.name,mime:f.type||'application/octet-stream',data:data64}});
    if(!j.ok)throw new Error(errText(j.error));
  }
}
function setUplMsg(id,t){const el=document.getElementById(id);if(el)el.textContent=t}

  }

  const cards=rounds.map(roundCardAdmin).join('');

    <div class="topline">
      <h2 style="color:var(--ink)">Cổng nộp báo cáo online</h2>

function roundCardAdmin(r){
  const tg=pTargets(r);
  const grp={ok:[],late:[],miss:[],wait:[]};
  tg.forEach(s=>grp[pStatus(r,s.id)].push(s.name));
  const done=grp.ok.length+grp.late.length;
  const over=r.deadline&&(portal.serverToday||today())>r.deadline;
  const key='pr-'+r.id, open=expanded.has(key);
  const rows=tg.map(s=>{
    const st=pStatus(r,s.id),sub=pSub(r.id,s.id),ext=pExt(r.id,s.id);
    const files=(sub&&sub.files||[]).map(f=>f.url
      ?`<span class="filechip"><a href="${esc(f.url)}" target="_blank">📄 ${esc(f.name)}</a></span>`
      :`<span class="filechip">📄 ${esc(f.name)}</span>`).join('');
    const linkInfo=(sub&&sub.linkDone)
      ?`<br><span class="note" style="color:var(--ok)">📊 Đã cập nhật link lúc ${fmtTime(sub.linkTime)}</span>${sub.linkEdit?'<br><span class="note" style="color:var(--warn)">✎ Sửa lần cuối: '+fmtTime(sub.linkEdit)+'</span>':''}${sub.linkNote?'<br><span class="note">Ghi chú: '+esc(sub.linkNote)+'</span>':''}`
      :'';
    return `<tr>
      <td>${esc(s.name)}<br><span class="note">${esc(s.level||'')}</span>${ext?'<br><span class="note" style="color:var(--warn)">Gia hạn riêng đến '+fmt(ext)+'</span>':''}</td>
      <td>${stampHTML[st]}${(sub&&sub.nFiles)?'<br><span class="note">'+fmtTime(sub.time)+(sub.byAdmin?' · <b>Phòng nộp thay</b>':'')+'</span>':''}${sub&&sub.forcedOk?'<br><span class="note"><b>du di đúng hạn</b></span>':''}${files?'<br>'+files:''}${linkInfo}</td>
      ${isView()?'':`<td><div class="rowactions">
        ${(r.mode==='file'||r.mode==='both')?`<button class="btn sm ghost" onclick="openSubmitFor('${r.id}','${s.id}')">Nộp thay</button>`:''}
        ${(r.mode==='link'||r.mode==='both')?((sub&&sub.linkDone)
          ?`<button class="btn sm ghost" onclick="adminLinkDone('${r.id}','${s.id}',false)">↺ Bỏ hoàn thành</button>`
          :`<button class="btn sm" style="background:var(--ok)" onclick="adminLinkDone('${r.id}','${s.id}',true)">✓ Hoàn thành</button>`):''}
        <button class="btn sm ghost" onclick="openExtForm('${r.id}','${s.id}')">Gia hạn</button>
        ${st==='late'?(sub&&sub.forcedOk?`<button class="btn sm ghost" onclick="forceOk('${r.id}','${s.id}',false)">↺ Bỏ du di</button>`:`<button class="btn sm ghost" onclick="forceOk('${r.id}','${s.id}',true)">✓ Du di đúng hạn</button>`):''}
        ${sub?`<button class="btn sm danger" onclick="removeSub('${r.id}','${s.id}')">Gỡ</button>`:''}
      </div></td>`}
    </tr>`;
  }).join('');
  const tpls=(r.templates||[]).map(f=>`<span class="filechip"><a href="${esc(f.url)}" target="_blank">📎 ${esc(f.name)}</a></span>`).join('');
  return `<div class="card${r.urgent?' urgent':''}">
    <div class="topline">
      <div><h2>${esc(r.title)}${r.urgent?' <span class="urgentbadge">🔥 KHẨN</span>':''}${r.locked?' <span class="stamp miss" style="transform:none">Đã khóa</span>':''}</h2>
      <div class="rmeta">
        <span class="pill dl${over?' over':''}"><span class="ic">⏰</span> Hạn nộp: ${fmtDeadline(r.deadline,r.dtime)}</span>
        <span class="pill tg"><span class="ic">🏫</span> ${tg.length} trường</span>
        <span class="pill done"><span class="ic">✔</span> ${done}/${tg.length} hoàn thành</span>
        <span class="pill" style="background:#EEF;border-color:#CCD">${r.mode==='link'?'📊 Nhập link':r.mode==='both'?'📄+📊 File & Link':'📄 Nộp file'}</span>
        ${((r.mode==='link'||r.mode==='both')&&r.linkUrl)?`<a class="pill" style="background:#EAF2FF;border-color:#C7DCFF;text-decoration:none" href="${esc(r.linkUrl)}" target="_blank">🔗 Mở link</a>`:''}
      </div></div>
      <div class="rowactions">
        <button class="btn sm ghost allow-view" onclick="toggleCard('${key}')">${open?'▲ Thu gọn':'▼ Chi tiết'}</button>
        ${isView()?'':`${r.urgent
          ?`<button class="btn sm ghost" onclick="toggleUrgent('${r.id}',false)">↺ Bỏ khẩn</button>`
          :`<button class="btn sm danger" onclick="toggleUrgent('${r.id}',true)">🔥 Khẩn</button>`}
        <button class="btn sm ghost" onclick="openRoundForm('${r.id}')">Sửa</button>
        <button class="btn sm ghost" onclick="lockRound('${r.id}')">${r.locked?'Mở khóa':'Khóa'}</button>
        <button class="btn sm danger" onclick="delRound('${r.id}')">Xóa</button>`}
      </div>
    </div>
    ${r.guide?'<div class="guidebox">📋 '+esc(r.guide)+'</div>':''}
    <div class="maxnote">⚠ Dung lượng tối đa ${portal.maxMb}MB/file</div>
    ${tpls?'<div style="margin:6px 0">File mẫu: '+tpls+'</div>':''}
    ${qsumHTML([['✔ Đã nộp','qs-ok',grp.ok],['⚠ Nộp trễ','qs-late',grp.late],['✘ Quá hạn chưa nộp','qs-miss',grp.miss],['○ Chưa nộp (còn hạn)','qs-wait',grp.wait]])}
    ${open?`<div style="overflow-x:auto"><table><thead><tr><th>Trường</th><th>Trạng thái & file</th>${isView()?'':'<th></th>'}</tr></thead><tbody>${rows}</tbody></table></div>`:''}
  </div>`;
}

async function saveRound(id){
  const title=document.getElementById('f_title').value.trim();
  if(!title){alert('Vui lòng nhập tên đợt.');return}
  const deadline=document.getElementById('f_deadline').value;
  const dtime=document.getElementById('f_dtime').value;
  const guide=document.getElementById('f_guide').value.trim();
  const mode=document.getElementById('f_mode').value;
  const linkUrl=(document.getElementById('f_linkurl')?document.getElementById('f_linkurl').value.trim():'');
  if((mode==='link'||mode==='both')&&!linkUrl){alert('Bạn đã chọn hình thức có nhập link — vui lòng dán link cập nhật số liệu.');return}
  const targets=readTargets();
  if(!targets.length){alert('Vui lòng chọn ít nhất 1 trường thuộc đối tượng.');return}
  const tplInput=document.getElementById('f_tpl');
  const tplFiles=tplInput?tplInput.files:[];
  const clearTpl=document.getElementById('f_tplclear')&&document.getElementById('f_tplclear').checked;
  const tooBig=checkFiles(tplFiles);
  if(tooBig.length){alert('File mẫu quá lớn (tối đa '+portal.maxMb+'MB): '+tooBig.map(f=>f.name).join(', '));return}
  setUplMsg('uplMsg','Đang lưu đợt...');
  try{
    const j=await api('round_save',{id,title,deadline,dtime,guide,targets,mode,linkUrl});
    if(!j.ok)throw new Error(errText(j.error));
    const rid=j.id;
    if(clearTpl){await api('tpl_clear',{roundId:rid})}
    if(tplFiles.length){await uploadSeq(tplFiles,p=>api('tpl_add',Object.assign({roundId:rid},p)),'uplMsg')}
    closeModal();await portalLoad();
  }catch(e){setUplMsg('uplMsg','');alert(e.message||'Lưu thất bại.')}
}
// Ẩn/hiện ô link theo hình thức nộp đã chọn

  const m=document.getElementById('f_mode').value;
  const w=document.getElementById('f_linkwrap');
  if(w)w.style.display=(m==='link'||m==='both')?'block':'none';
}
async function lockRound(id){
  const j=await api('round_lock',{id});
  if(!j.ok){alert(errText(j.error));return}
  await portalLoad();
}
async function delRound(id){
  if(!confirm('Xóa đợt nộp này? Toàn bộ file các trường đã nộp trong đợt sẽ được chuyển vào Thùng rác trên Google Drive.'))return;
  const j=await api('round_delete',{id});
  if(!j.ok){alert(errText(j.error));return}
  await portalLoad();
}
function openSubmitFor(rid,sid){
  openModal(`
    <h3>Nộp thay cho trường</h3>
    <p class="note" style="margin-bottom:8px">${esc(pName(sid))} — đợt: <b>${esc((portal.rounds.find(r=>r.id===rid)||{}).title||'')}</b></p>

    <div class="maxnote">⚠ Dung lượng tối đa ${portal.maxMb}MB/file</div>
    <div id="uplMsg" class="note" style="margin-top:6px"></div>
    <div class="actions">
      <button class="btn ghost" onclick="closeModal()">Hủy</button>
      <button class="btn" onclick="adminSubmit('${rid}','${sid}')">Gửi</button>
    </div>`);
}
async function adminSubmit(rid,sid){
  const inp=document.getElementById('f_subfiles');
  if(!inp.files.length){alert('Chưa chọn file.');return}
  const tooBig=checkFiles(inp.files);
  if(tooBig.length){alert('File quá lớn (tối đa '+portal.maxMb+'MB): '+tooBig.map(f=>f.name).join(', '));return}
  try{
    await uploadSeq(inp.files,p=>api('submit_file',Object.assign({roundId:rid,schoolId:sid},p)),'uplMsg');
    closeModal();await portalLoad();
  }catch(e){setUplMsg('uplMsg','');alert(e.message||'Gửi thất bại.')}
}

// Bản 17 — Phòng chủ động kích "Hoàn thành" phần nhập link cho từng trường
// (VD Phòng kiểm tra Google Sheet thấy trường đã điền đủ số liệu thì kích luôn,
// không phải chờ trường tự bấm — chủ động và dễ quản lý hơn).
async function adminLinkDone(rid,sid,done){
  if(done){
    const note=prompt('Xác nhận trường '+pName(sid)+' đã hoàn thành cập nhật link.\nGhi chú (có thể sửa hoặc để trống):','Phòng xác nhận đã hoàn thành');
    if(note===null)return;
    const j=await api('link_done',{roundId:rid,schoolId:sid,done:1,note:note.trim()});
    if(!j.ok){alert(errText(j.error));return}
  }else{
    if(!confirm('Bỏ đánh dấu hoàn thành phần nhập link của trường '+pName(sid)+'?'))return;
    const j=await api('link_done',{roundId:rid,schoolId:sid,done:0,note:''});
    if(!j.ok){alert(errText(j.error));return}
  }
  await portalLoad();
}
// Bản 17 — Bật/tắt trạng thái KHẨN của đợt: đợt khẩn hiện đỏ và luôn xếp đầu
async function toggleUrgent(rid,on){

}

/* ---------- CỔNG PHÍA TRƯỜNG (view='portal') ---------- */
function renderSchoolPortal(){
  if(!portal.loaded){portalLoad();return `<div class="card"><div class="empty"><b>Đang tải cổng nộp báo cáo…</b>Vui lòng đợi trong giây lát.</div></div>`}
  const mine=mySid();
  const rounds=sortRounds(portal.rounds.filter(r=>!r.targets.length||r.targets.includes(mine)));
  const cards=rounds.map(r=>{
    const st=pStatus(r,mine),sub=pSub(r.id,mine),eff=pEff(r,mine),ext=pExt(r.id,mine);
    const dl=daysLeft(eff);
    let count='';
    if(st==='ok'){count=''}
    else if(dl===null){count=''}
    else if(dl>0)count=`<span class="soonflag">Còn ${dl} ngày</span>`;
    else if(dl===0)count=`<span class="soonflag">Hạn chót hôm nay</span>`;
    else count=`<span class="soonflag" style="color:var(--stamp)">Quá hạn ${-dl} ngày — vẫn nộp được, sẽ ghi nhận nộp trễ</span>`;
    const tpls=(r.templates||[]).map(f=>`<span class="filechip"><a href="${esc(f.url)}" target="_blank">📎 ${esc(f.name)}</a></span>`).join('');
    const myFiles=(sub&&sub.files||[]).map(f=>`<span class="filechip">📄 ${esc(f.name)}</span>`).join('');
    const mode=r.mode||'file';
    const wantFile=(mode==='file'||mode==='both');
    const wantLink=(mode==='link'||mode==='both');
    // Khối nộp FILE
    const fileBlock = !wantFile ? '' : (
      r.locked
        ?'<div class="note" style="color:var(--stamp);font-weight:600">🔒 Đợt đã khóa — vui lòng liên hệ Phòng nếu cần nộp bổ sung.</div>'

          ? `<div class="note" style="color:var(--ok);font-weight:600">✔ Trường đã đánh dấu hoàn thành lúc ${fmtTime(sub.linkTime)}.</div>

             ${r.locked?'':`<div style="margin-top:6px"><input id="ln-${r.id}" placeholder="Sửa ghi chú (nếu cần)..." value="${esc(sub.linkNote||'')}"></div>
             <div style="margin-top:6px"><button class="btn sm ghost" onclick="schoolLinkDone('${r.id}',true)">Cập nhật ghi chú</button>

             :`<div style="margin-top:6px"><input id="ln-${r.id}" placeholder="Ghi chú ngắn (VD: đã cập nhật số liệu mục A, B...)"></div>
               <div style="margin-top:6px"><button class="btn" onclick="schoolLinkDone('${r.id}',true)">✔ Đánh dấu đã hoàn thành</button></div>`)}
      </div>`;
    return `<div class="card${r.urgent?' urgent':''}">
      <div class="topline">
        <div><h2>${esc(r.title)}${r.urgent?' <span class="urgentbadge">🔥 KHẨN</span>':''}</h2>

          ${ext?'<span class="pill dl" style="background:#FBF3E2;color:var(--warn);border-color:#E7D9AE"><span class="ic">📅</span> Gia hạn riêng: '+fmt(ext)+'</span>':''}

      ${(sub&&sub.nFiles)?'<div style="margin:8px 0"><span class="note">File đã nộp lúc '+fmtTime(sub.time)+(sub.byAdmin?' (Phòng nộp thay)':'')+':</span><br>'+myFiles+'</div>':''}
      <div id="uplMsg" class="note"></div>

      <div style="margin-top:10px"><button class="btn sm ghost allow-view" onclick="toggleCard('ps-${r.id}')">${expanded.has('ps-'+r.id)?'▲ Ẩn tình hình các trường':'▼ Xem tình hình nộp của các trường'}</button></div>
      ${expanded.has('ps-'+r.id)?pSchoolStatusBlock(r):''}

  }).join('');
  return `
    <div class="legend">Xin chào <b>${esc(sync.schoolName||'Nhà trường')}</b>. Chọn đợt bên dưới để nộp báo cáo. File nộp chuyển thẳng về Phòng; các trường khác không xem được file của trường mình.</div>
    ${rounds.length?cards:'<div class="card"><div class="empty"><b>Chưa có đợt nộp nào dành cho trường</b>Khi Phòng mở đợt mới, đợt sẽ hiện ở đây.</div></div>'}`;
}
function pSchoolStatusBlock(r){
  const tg=pTargets(r);
  const grp={ok:[],late:[],miss:[],wait:[]};
  tg.forEach(s=>grp[pStatus(r,s.id)].push(s.name));
  return qsumHTML([['✔ Đã nộp','qs-ok',grp.ok],['⚠ Nộp trễ','qs-late',grp.late],['✘ Quá hạn chưa nộp','qs-miss',grp.miss],['○ Chưa nộp (còn hạn)','qs-wait',grp.wait]]);
}
async function schoolSubmit(rid){
  const inp=document.getElementById('sf-'+rid);
  if(!inp||!inp.files.length){alert('Chưa chọn file để nộp.');return}
  const tooBig=checkFiles(inp.files);
  if(tooBig.length){alert('File quá lớn (tối đa '+portal.maxMb+'MB): '+tooBig.map(f=>f.name).join(', ')+'\nVui lòng nén hoặc chia nhỏ file.');return}
  const sub=pSub(rid,mySid());
  if(sub&&!confirm('Nộp lại sẽ GHI ĐÈ toàn bộ file đã nộp trước đó của trường. Tiếp tục?'))return;
  try{
    await uploadSeq(inp.files,p=>api('submit_file',Object.assign({roundId:rid},p)),'uplMsg');
    setUplMsg('uplMsg','');
    await portalLoad();
    alert('✅ Nộp báo cáo thành công!');
  }catch(e){setUplMsg('uplMsg','');alert(e.message||'Nộp thất bại. Vui lòng thử lại.')}
}
// Trường đánh dấu hoàn thành / bỏ hoàn thành phần nhập link (kèm ghi chú)
async function schoolLinkDone(rid,done){
  const noteEl=document.getElementById('ln-'+rid);
  const note=noteEl?noteEl.value.trim():'';
  const mine=mySid();
  const r=portal.rounds.find(x=>x.id===rid)||{};
  const sub=pSub(rid,mine);
  const alreadyDone=sub&&sub.linkDone;   // đã hoàn thành trước đó → đây là lần sửa lại
  const eff=dnorm(pEff(r,mine));
  const overdue=eff&&dnorm(portal.serverToday||today())>eff;  // hiện đã quá hạn chưa
  if(!done){
    if(!confirm('Bỏ đánh dấu hoàn thành phần nhập link cho đợt này?'))return;
  }else if(alreadyDone&&overdue){
    // Sửa lại sau khi đã quá hạn → cảnh báo rõ
    if(!confirm('⚠ LƯU Ý: Đợt này ĐÃ QUÁ HẠN nộp.\n\nBạn đang sửa lại phần đã hoàn thành. Lần sửa này sẽ được ghi nhận là "sửa sau hạn" và có thể bị tính là nộp trễ.\n\nTiếp tục cập nhật?'))return;
  }
  try{
    const j=await api('link_done',{roundId:rid,done:done?1:0,note});
    if(!j.ok)throw new Error(errText(j.error));
    await portalLoad();
    if(done){
      if(alreadyDone)alert('✅ Đã cập nhật lại ghi chú.'+(overdue?'\n⚠ Lưu ý: lần sửa này sau hạn nộp.':''));
      else alert('✅ Đã ghi nhận hoàn thành cập nhật số liệu!');
    }
  }catch(e){alert(e.message||'Không lưu được. Vui lòng thử lại.')}
}

/* ---------- LỊCH HOẠT ĐỘNG CHUNG (view='acts') ---------- */
let calMonth=thisMonth(),calSel='';
function renderCalendar(){
  if(!syncOn()){
    return `<div class="card"><div class="empty"><b>Chưa kết nối máy chủ</b>Lịch hoạt động chung cần bật đồng bộ.</div></div>`;
  }
  if(!portal.loaded){portalLoad();return `<div class="card"><div class="empty"><b>Đang tải lịch hoạt động…</b>Vui lòng đợi trong giây lát.</div></div>`}
  const [y,m]=calMonth.split('-').map(Number);
  const first=new Date(y,m-1,1);
  const lead=(first.getDay()+6)%7; // Thứ 2 đầu tuần
  const dim=new Date(y,m,0).getDate();
  // Tất cả hoạt động lấy từ máy chủ (sheet ACTS) — gồm cả HĐ cấp trên (schoolId='upper')
  // nên MỌI vai trò (phòng, trường, lãnh đạo) đều thấy giống nhau.
  const allActs=portal.acts.map(a=>a.schoolId==='upper'?Object.assign({},a,{_upper:true}):a);
  const monthActs=allActs.filter(a=>(a.date||'').slice(0,7)===calMonth);
  const dowNames=['T2','T3','T4','T5','T6','T7','CN'];
  let cells=dowNames.map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<lead;i++)cells+='<div class="calday off"></div>';
  for(let d=1;d<=dim;d++){
    const ds=calMonth+'-'+String(d).padStart(2,'0');
    const dayActs=monthActs.filter(a=>a.date===ds);
    const isToday=ds===(portal.serverToday||today());
    const sel=ds===calSel;
    const mini=dayActs.slice(0,2).map(a=>`<div class="calmini">${a.schoolId==='upper'?'◆':a.schoolId==='phong'?'●':'○'} ${esc(a.title)}</div>`).join('')
      +(dayActs.length>2?`<div class="calmini">+${dayActs.length-2} nữa…</div>`:'');
    cells+=`<div class="calday${isToday?' today':''}${sel?' sel':''}" onclick="calSel=${sel?"''":`'${ds}'`};render()">
      <b>${d}</b>${dayActs.length?`<span class="cnt">${dayActs.length}</span>`:''}${mini}</div>`;
  }
  const listActs=(calSel?monthActs.filter(a=>a.date===calSel):monthActs)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
  const list=listActs.map(actItemHTML).join('');
  const legend=isSchool()
    ? 'Đăng hoạt động nổi bật của trường để Phòng nắm lịch và cử đại biểu dự. File kế hoạch chỉ Phòng xem được.'
    : 'Lịch tổng hợp: ◆ xanh đậm là hoạt động cấp trên, ● đỏ là hoạt động của Phòng, ○ là hoạt động các trường. Bấm một ngày để lọc; bấm lại để bỏ lọc.';
  return `
    <div class="topline">
      <h2 style="color:var(--ink)">Lịch hoạt động ${fmtMonth(calMonth)}</h2>
      <div class="filters">
        <input type="month" value="${calMonth}" onchange="calMonth=this.value||calMonth;calSel='';render()">
        ${isView()?'':'<button class="btn" onclick="openActForm()">+ Đăng hoạt động</button>'}
        ${isSchool()?'':'<button class="btn ghost allow-view" onclick="exportActsXLSX()">⬇ Xuất Excel</button>'}
      </div>
    </div>
    <div class="legend">${legend}</div>
    <div class="card">
      <div class="cal">${cells}</div>
      ${calSel?`<div class="note" style="margin-bottom:6px">Đang xem ngày <b>${fmt(calSel)}</b> — <a href="#" onclick="calSel='';render();return false">xem cả tháng</a></div>`:''}
      ${listActs.length?list:'<div class="empty"><b>Không có hoạt động nào</b>'+(calSel?'trong ngày đã chọn.':'trong tháng này.')+'</div>'}
    </div>`;
}
function actItemHTML(a){

  // Hoạt động cấp trên (gộp từ mục HĐ cấp trên): chỉ hiển thị, không sửa tại lịch
  if(a._upper){
    return `<div class="actitem" style="border-left:3px solid var(--ink)">
      <div><span class="actdate">${fmt(a.date)}${a.time?' · '+esc(a.time):''}</span>
        <span class="tag" style="background:var(--ink);color:#fff">◆ Hoạt động cấp trên</span>
        ${soon?'<span class="soonflag">● Sắp diễn ra</span>':''}</div>
      <div style="margin-top:4px"><b>${esc(a.title)}</b>${a.place?' · 📍 '+esc(a.place):''}</div>
      ${a.note?'<div class="note">'+esc(a.note)+'</div>':''}
      ${(!isSchool()&&!isView())?'<div class="note" style="color:var(--ink)">Quản lý hoạt động này tại mục “Th/Gia H/Động”.</div>':''}
    </div>`;
  }
  const canEdit=!isView()&&(!isSchool()||a.schoolId===mySid());
  const files=(a.files||[]).map(f=>f.url
    ?`<span class="filechip"><a href="${esc(f.url)}" target="_blank">📄 ${esc(f.name)}</a></span>`
    :`<span class="filechip">📄 ${esc(f.name)}</span>`).join('');
  return `<div class="actitem">
    <div><span class="actdate">${fmt(a.date)}${a.time?' · '+esc(a.time):''}</span>
      <span class="tag ${a.schoolId==='phong'?'phong':'act'}">${esc(pName(a.schoolId))}</span>
      ${soon?'<span class="soonflag">● Sắp diễn ra</span>':''}</div>
    <div style="margin-top:4px"><b>${esc(a.title)}</b>${a.place?' · 📍 '+esc(a.place):''}</div>
    ${a.proposed?'<div class="note">Đại biểu trường đề xuất: '+esc(a.proposed)+'</div>':''}
    ${a.assigned?'<div class="note" style="color:var(--ink)"><b>Phòng phân công dự:</b> '+esc(a.assigned)+'</div>':''}
    ${a.note?'<div class="note">'+esc(a.note)+'</div>':''}
    ${files?'<div style="margin-top:4px">'+files+'</div>':''}
    ${(canEdit||(!isSchool()&&!isView()))?`<div class="rowactions" style="margin-top:6px">
      ${canEdit?`<button class="btn sm ghost" onclick="openActForm('${a.id}')">Sửa</button>`:''}
      ${(!isSchool()&&!isView())?`<button class="btn sm ghost" onclick="openAssignForm('${a.id}')">Phân công ĐB</button>`:''}
      ${canEdit?`<button class="btn sm danger" onclick="delAct('${a.id}')">Hủy</button>`:''}
    </div>`:''}
  </div>`;
}

async function saveAct(id){
  const title=document.getElementById('fa_title').value.trim();
  if(!title){alert('Vui lòng nhập tên hoạt động.');return}
  const payload={id,title,
    date:document.getElementById('fa_date').value||today(),
    time:document.getElementById('fa_time').value,
    place:document.getElementById('fa_place').value.trim(),
    proposed:document.getElementById('fa_proposed').value.trim(),
    note:document.getElementById('fa_note').value.trim()};
  const unit=document.getElementById('fa_school');
  if(unit)payload.schoolId=unit.value;
  const asg=document.getElementById('fa_assigned');
  if(asg)payload.assigned=asg.value.trim();
  const inp=document.getElementById('fa_files');
  const tooBig=inp?checkFiles(inp.files):[];
  if(tooBig.length){alert('File quá lớn (tối đa '+portal.maxMb+'MB): '+tooBig.map(f=>f.name).join(', '));return}
  setUplMsg('uplMsg','Đang lưu...');
  try{
    const j=await api('act_save',payload);
    if(!j.ok)throw new Error(errText(j.error));
    if(inp&&inp.files.length){await uploadSeq(inp.files,p=>api('act_file',Object.assign({actId:j.id},p)),'uplMsg')}
    closeModal();await portalLoad();
  }catch(e){setUplMsg('uplMsg','');alert(e.message||'Lưu thất bại.')}
}
async function delAct(id){
  if(!confirm('Hủy (xóa) hoạt động này? File kế hoạch kèm theo sẽ được chuyển vào Thùng rác.'))return;
  const j=await api('act_delete',{id});
  if(!j.ok){alert(errText(j.error));return}
  await portalLoad();
}

async function saveAssign(id){

function exportActsXLSX(){
  if(typeof XLSX==='undefined'){alert('Không tải được thư viện Excel (cần kết nối mạng).');return}
  const acts=[...portal.acts].sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.time||'').localeCompare(b.time||''));
  const aoa=[['Ngày','Giờ','Đơn vị','Bậc học','Hoạt động','Địa điểm','ĐB trường đề xuất','Phòng phân công','Ghi chú','Số file KH']];
  acts.forEach(a=>aoa.push([fmt(a.date),a.time||'',pName(a.schoolId),a.schoolId==='phong'?'':pLevel(a.schoolId),a.title,a.place||'',a.proposed||'',a.assigned||'',a.note||'',(a.files||[]).length]));
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=aoa[0].map((_,c)=>({wch:Math.min(40,Math.max(...aoa.map(r=>String(r[c]??'').length))+2)}));
  XLSX.utils.book_append_sheet(wb,ws,'Lịch hoạt động');
  XLSX.writeFile(wb,'lich-hoat-dong-cac-truong.xlsx');
}

  done:{label:'Đã xử lý',cls:'qs-ok',ic:'✔'}
};
function fbStatusChip(st){const s=FB_STATUS[st]||FB_STATUS.new;return `<span class="chip ${s.cls}">${s.ic} ${s.label}</span>`}

function renderFeedback(){
  if(!syncOn()){return `<div class="card"><div class="empty"><b>Chưa kết nối máy chủ</b>Mục Kiến nghị – Phản ánh cần bật đồng bộ.</div></div>`}
  if(!portal.loaded){portalLoad();return `<div class="card"><div class="empty"><b>Đang tải…</b>Vui lòng đợi trong giây lát.</div></div>`}
  const school=isSchool();
  const canManage=!school&&!isView(); // phòng
  const list=[...portal.feedback].sort((a,b)=>(b.created||'').localeCompare(a.created||''));

  // Khối gửi mới (chỉ trường và phòng, không dành cho lãnh đạo xem)
  const formBlock = isView()?'' : (school?`
    <div class="card">
      <h2>Gửi kiến nghị / phản ánh mới</h2>
      <div class="field"><label>Nội dung *</label><textarea id="fb_content" placeholder="Nhập nội dung kiến nghị, đề xuất hoặc phản ánh của trường..."></textarea></div>
      <div class="field"><label>Đính kèm ảnh (tối đa 3 ảnh, ${portal.maxMb}MB/ảnh)</label><input type="file" id="fb_imgs" accept="image/*" multiple></div>
      <div id="fbMsg" class="note"></div>
      <button class="btn" onclick="fbSend()">📣 Gửi lên Phòng</button>
    </div>`:'');

  const cards=list.map(f=>{
    const st=f.status||'new';
    const imgs=(f.files||[]).map(im=>im.url
      ?`<a class="filechip" href="${esc(im.url)}" target="_blank">🖼 ${esc(im.name)}</a>`
      :`<span class="filechip">🖼 ${esc(im.name)}</span>`).join('');
    // Quyền xóa: trường xóa của mình khi còn 'new'; phòng xóa bất kỳ
    const canDelSchool=school&&st==='new'&&f.schoolId===mySid();
    const canDelAdmin=canManage;
    return `<div class="card">
      <div class="topline">
        <div>
          ${canManage?`<h2 style="margin-bottom:2px">${esc(pName(f.schoolId))}</h2>`:''}
          <span class="note">Gửi lúc ${fmtTime(f.created)}</span> ${fbStatusChip(st)}
        </div>
        <div class="rowactions">
          ${canManage?`
            <select onchange="fbSetStatus('${f.id}',this.value)" style="width:auto;min-width:120px">
              ${Object.entries(FB_STATUS).map(([k,v])=>`<option value="${k}" ${st===k?'selected':''}>${v.label}</option>`).join('')}
            </select>`:''}
          ${canDelSchool?`<button class="btn sm danger" onclick="fbDelete('${f.id}')">Xóa</button>`:''}
          ${canDelAdmin?`<button class="btn sm danger" onclick="fbDelete('${f.id}')">Xóa</button>`:''}
        </div>
      </div>
      <div style="margin:6px 0;white-space:pre-line">${esc(f.content)}</div>
      ${imgs?'<div style="margin:6px 0">'+imgs+'</div>':''}
      ${f.reply
        ? `<div class="guidebox" style="border-left-color:var(--ok);background:#F0F8F3">
             <b style="color:var(--ok)">📩 Phản hồi của Phòng${f.replyAt?' ('+fmtTime(f.replyAt)+')':''}:</b>\n${esc(f.reply)}</div>`
        : (canManage?'':'<div class="note">Phòng chưa phản hồi.</div>')}
      ${canManage?`
        <div class="field" style="margin-top:8px"><label>Phản hồi cho trường (giải thích, hướng xử lý...)</label>
          <textarea id="fbr-${f.id}" placeholder="Nhập nội dung phản hồi...">${esc(f.reply||'')}</textarea></div>
        <button class="btn sm" onclick="fbReply('${f.id}')">💬 ${f.reply?'Cập nhật phản hồi':'Gửi phản hồi'}</button>`:''}
    </div>`;
  }).join('');

  const legend=school
    ? 'Gửi kiến nghị, đề xuất, phản ánh lên Phòng. Chỉ trường bạn và Phòng thấy được nội dung này. Khi còn "Mới gửi", bạn có thể xóa nếu gửi nhầm; khi Phòng đã tiếp nhận thì không xóa được nữa.'
    : (isView()
      ? 'Xem toàn bộ kiến nghị – phản ánh của các trường và phản hồi của Phòng (chế độ chỉ xem).'
      : 'Tiếp nhận kiến nghị – phản ánh từ các trường. Bạn phản hồi và chuyển trạng thái: Mới gửi → Đang xem → Đã xử lý. Mỗi trường chỉ thấy kiến nghị của chính mình.');

  const heading=canManage?'Kiến nghị – Phản ánh của các trường':'Kiến nghị – Phản ánh';
  return `
    <div class="topline"><h2 style="color:var(--ink)">${heading}</h2></div>
    <div class="legend">${legend}</div>
    ${formBlock}
    ${list.length?cards:'<div class="card"><div class="empty"><b>Chưa có kiến nghị nào</b>'+(school?'Gửi kiến nghị đầu tiên bằng ô bên trên.':'Khi trường gửi kiến nghị, nội dung sẽ hiện ở đây.')+'</div></div>'}`;
}

async function fbSend(){
  const content=(document.getElementById('fb_content').value||'').trim();
  if(!content){alert('Vui lòng nhập nội dung kiến nghị.');return}
  const inp=document.getElementById('fb_imgs');
  const imgs=inp?[...inp.files].slice(0,3):[];
  if(inp&&inp.files.length>3){alert('Chỉ đính kèm tối đa 3 ảnh. Hệ thống sẽ lấy 3 ảnh đầu.');}
  const tooBig=checkFiles(imgs);
  if(tooBig.length){alert('Ảnh quá lớn (tối đa '+portal.maxMb+'MB): '+tooBig.map(f=>f.name).join(', '));return}
  setUplMsg('fbMsg','Đang gửi...');
  try{
    const files=[];
    for(const f of imgs){files.push({name:f.name,mime:f.type||'image/jpeg',data:await readB64(f)})}
    const j=await api('fb_add',{content,files});
    if(!j.ok)throw new Error(errText(j.error));
    setUplMsg('fbMsg','');
    await portalLoad();
    alert('✅ Đã gửi kiến nghị lên Phòng!');
  }catch(e){setUplMsg('fbMsg','');alert(e.message||'Gửi thất bại. Vui lòng thử lại.')}
}
async function fbDelete(id){
  if(!confirm('Xóa kiến nghị này? Thao tác không hoàn tác được.'))return;
  try{
    const j=await api('fb_delete',{id});
    if(!j.ok)throw new Error(errText(j.error));
    await portalLoad();
  }catch(e){alert(e.message||'Không xóa được.')}
}
async function fbReply(id){
  const el=document.getElementById('fbr-'+id);
  const reply=el?el.value.trim():'';
  if(!reply){alert('Vui lòng nhập nội dung phản hồi.');return}
  try{
    const j=await api('fb_reply',{id,reply});
    if(!j.ok)throw new Error(errText(j.error));
    await portalLoad();
    alert('✅ Đã gửi phản hồi cho trường.');
  }catch(e){alert(e.message||'Không lưu được phản hồi.')}
}
async function fbSetStatus(id,status){
  try{
    const j=await api('fb_status',{id,status});
    if(!j.ok)throw new Error(errText(j.error));
    await portalLoad();
  }catch(e){alert(e.message||'Không đổi được trạng thái.')}
}
const NAV_DEFAULT=document.querySelector('nav').innerHTML;
function buildNav(){
  const nav=document.querySelector('nav');
  if(isSchool()){
    nav.innerHTML=`
      <button id="tab-portal" onclick="go('portal')"><span class="tic">📤</span>Nộp báo cáo</button>
      <button id="tab-acts" onclick="go('acts')"><span class="tic">📅</span>Lịch hoạt động</button>
      <button id="tab-feedback" onclick="go('feedback')"><span class="tic">📣</span>K/Nghị – Ph/Ánh</button>`;
    if(!['portal','acts','feedback'].includes(view))view='portal';
  }else{
    nav.innerHTML=NAV_DEFAULT;
    if(['portal'].includes(view))view='reports';
  }
  nav.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  const act=document.getElementById('tab-'+view);
  if(act)act.classList.add('active');
}

/* ================== KHỞI ĐỘNG ================== */
document.getElementById('todayLabel').textContent='Bản 17 · Hôm nay: '+fmt(today());
applyRole(sync.role||'edit');
render();
syncStartup();
</script>
